name: Deploy static site to S3

on:
  push:
    branches:
      - main   # change if your default branch is "master"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Debug AWS permissions
        run: |
          echo "=== AWS Identity ==="
          aws sts get-caller-identity
          echo ""
          echo "=== Testing S3 permissions ==="
          echo "Testing ListBucket permission..."
          aws s3 ls s3://ears-conn.com || echo "❌ ListBucket permission denied"
          echo ""
          echo "Testing GetObject permission..."
          aws s3 ls s3://ears-conn.com/ || echo "❌ GetObject permission denied"
          echo ""
          echo "Testing PutObject permission..."
          echo "test" | aws s3 cp - s3://ears-conn.com/test-permission.txt || echo "❌ PutObject permission denied"
          echo ""
          echo "Cleaning up test file..."
          aws s3 rm s3://ears-conn.com/test-permission.txt || echo "❌ DeleteObject permission denied"

      - name: Inject workshop API URL into workshop-register.html (optional)
        env:
          WORKSHOP_REGISTER_POST_URL: ${{ secrets.WORKSHOP_REGISTER_POST_URL }}
        run: |
          if [ -z "$WORKSHOP_REGISTER_POST_URL" ]; then
            echo "No WORKSHOP_REGISTER_POST_URL secret; skipping HTML injection."
            exit 0
          fi
          python3 << 'PY'
          import pathlib, os, re
          url = os.environ["WORKSHOP_REGISTER_POST_URL"].strip()
          if not url:
              raise SystemExit(0)
          path = pathlib.Path("workshop-register.html")
          text = path.read_text(encoding="utf-8")
          new_text, n = re.subn(
              r"^(\s*)window\.__WORKSHOP_REGISTER_POST_URL__\s*=\s*''\s*;",
              r"\1window.__WORKSHOP_REGISTER_POST_URL__ = " + repr(url) + r";",
              text,
              count=1,
              flags=re.M,
          )
          if n != 1:
              raise SystemExit("workshop-register.html: could not inject WORKSHOP_REGISTER_POST_URL (marker missing).")
          path.write_text(new_text, encoding="utf-8")
          PY

      - name: Deploy to S3
        run: |
          echo "Starting S3 sync deployment..."
          if aws s3 sync . s3://ears-conn.com --delete --exclude ".git/*" --exclude ".github/*" --exclude ".DS_Store" --exclude "aws/*"; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed!"
            echo "Please check the AWS IAM permissions for user: earsconn-dev"
            echo "Required permissions: s3:ListBucket, s3:GetObject, s3:PutObject, s3:DeleteObject"
            exit 1
          fi

      # If you're using React/Vue/etc. and have a build folder, replace above with:
      # - name: Build site
      #   run: npm ci && npm run build
      #
      # - name: Sync build output to S3
      #   run: aws s3 sync build/ s3://ears-conn.com --delete
