# Deploy icra-2026-connected-robots branch to connected-robots.com
name: Deploy to connected-robots.com

on:
  push:
    branches:
      - icra-2026-connected-robots

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Use same secrets as main deploy; if connected-robots.com uses a different AWS account,
          # add AWS_ACCESS_KEY_ID_CONNECTED_ROBOTS and AWS_SECRET_ACCESS_KEY_CONNECTED_ROBOTS
          # and reference them here instead.
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3 (connected-robots.com)
        run: |
          echo "Deploying icra-2026-connected-robots to connected-robots.com..."
          if aws s3 sync . s3://connected-robots.com --delete --exclude ".git/*" --exclude ".github/*" --exclude ".DS_Store"; then
            echo "✅ Deployment to connected-robots.com successful!"
          else
            echo "❌ Deployment failed!"
            echo "Ensure the S3 bucket 'connected-robots.com' exists and the IAM user has s3:ListBucket, s3:GetObject, s3:PutObject, s3:DeleteObject."
            exit 1
          fi
