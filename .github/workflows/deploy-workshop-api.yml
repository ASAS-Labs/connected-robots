name: Deploy workshop registration API (SAM)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'aws/workshop-register/**'

jobs:
  deploy-workshop-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: SAM build
        working-directory: aws/workshop-register
        run: sam build

      - name: SAM deploy
        working-directory: aws/workshop-register
        run: |
          sam deploy \
            --no-confirm-changeset \
            --capabilities CAPABILITY_IAM \
            --stack-name ears-conn-workshop-register \
            --resolve-s3 \
            --parameter-overrides \
              'PublicSiteOrigin=https://ears-conn.com' \
              'ThankYouPath=/workshop-register.html?thanks=1' \
            --no-fail-on-empty-changeset
