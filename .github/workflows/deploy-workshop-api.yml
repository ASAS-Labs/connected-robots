name: Deploy workshop registration API (SAM)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'aws/workshop-register/**'

jobs:
  deploy-workshop-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify SAM project path
        run: |
          test -d aws/workshop-register || { echo "Missing aws/workshop-register — commit the SAM app from this repo." >&2; exit 1; }
          test -f aws/workshop-register/template.yaml || { echo "Missing aws/workshop-register/template.yaml" >&2; exit 1; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: SAM build
        working-directory: aws/workshop-register
        run: sam build

      - name: SAM deploy
        working-directory: aws/workshop-register
        env:
          TURNSTILE_SECRET_KEY: ${{ secrets.WORKSHOP_TURNSTILE_SECRET_KEY }}
        run: |
          set -e
          if [ -z "${TURNSTILE_SECRET_KEY:-}" ]; then
            sam deploy \
              --no-confirm-changeset \
              --capabilities CAPABILITY_IAM \
              --stack-name ears-conn-workshop-register \
              --resolve-s3 \
              --parameter-overrides \
                'PublicSiteOrigin=https://ears-conn.com' \
                'ThankYouPath=/workshop-register.html?thanks=1' \
              --no-fail-on-empty-changeset
          else
            sam deploy \
              --no-confirm-changeset \
              --capabilities CAPABILITY_IAM \
              --stack-name ears-conn-workshop-register \
              --resolve-s3 \
              --parameter-overrides \
                'PublicSiteOrigin=https://ears-conn.com' \
                'ThankYouPath=/workshop-register.html?thanks=1' \
                "TurnstileSecretKey=${TURNSTILE_SECRET_KEY}" \
              --no-fail-on-empty-changeset
          fi
