AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: EARS-CONN workshop pre-registration API (API Gateway HTTP API + Lambda + DynamoDB)

Parameters:
  PublicSiteOrigin:
    Type: String
    Default: 'https://ears-conn.com'
    Description: Public origin of the static site (scheme + host, no trailing slash). Used for CORS and post-submit redirect.
  ThankYouPath:
    Type: String
    Default: '/workshop-register.html?thanks=1'
    Description: Path and query for successful submissions (must start with /).

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 256
    Timeout: 10
    Tracing: Active

Resources:
  WorkshopHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
        AllowOrigins:
          - !Ref PublicSiteOrigin

  WorkshopSubmissionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  WorkshopRegisterFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.handler
      CodeUri: src/
      Environment:
        Variables:
          TABLE_NAME: !Ref WorkshopSubmissionsTable
          PUBLIC_SITE_ORIGIN: !Ref PublicSiteOrigin
          THANK_YOU_PATH: !Ref ThankYouPath
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WorkshopSubmissionsTable
      Events:
        RegisterPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref WorkshopHttpApi
            Path: /register
            Method: POST

Outputs:
  HttpApiInvokeUrl:
    Description: Base URL of the HTTP API ($default stage).
    Value: !Sub 'https://${WorkshopHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  RegisterEndpoint:
    Description: Full POST URL for workshop-register.html (set window.__WORKSHOP_REGISTER_POST_URL__ or WORKSHOP_REGISTER_POST_URL secret).
    Value: !Sub 'https://${WorkshopHttpApi}.execute-api.${AWS::Region}.amazonaws.com/register'
  SubmissionsTableName:
    Description: DynamoDB table storing submissions (scan/query via console or CLI).
    Value: !Ref WorkshopSubmissionsTable
